<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebPlayer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a10;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px 16px 32px;
            gap: 16px;
        }

        /* ── Error box ─────────────────────────────────────────────────────── */
        #error-box {
            display: none;
            background: rgba(92, 26, 26, 0.9);
            color: #ffaaaa;
            border: 1px solid #a33;
            border-radius: 8px;
            padding: 12px 20px;
            width: 100%;
            max-width: 1200px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* ── Video container – this is the fullscreen target ───────────────── */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(0,0,0,0.6);
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
            display: block;
            touch-action: none;
        }

        .video-container:fullscreen,
        .video-container:-webkit-full-screen {
            width:  100vw !important;
            height: 100vh !important;
            max-width: none !important;
            border-radius: 0;
        }
        .video-container:fullscreen video,
        .video-container:-webkit-full-screen video {
            width:  100% !important;
            height: 100% !important;
            object-fit: contain !important;
        }

        /* ── Buffering spinner ────────────────────────────────────────────── */
        #buffering-indicator {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        #buffering-indicator.is-buffering { opacity: 1; }
        .spinner-ring {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #4a9eff;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Skip badge ────────────────────────────────────────────────────── */
        #skip-badge {
            position: absolute;
            bottom: 14px;
            right: 14px;
            background: rgba(74, 158, 255, 0.92);
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            pointer-events: none;
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            transform: translateY(4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #skip-badge.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #skip-badge svg { flex-shrink: 0; }

        /* ── Controls row ──────────────────────────────────────────────────── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            width: 100%;
            max-width: 1200px;
        }

        button, select {
            background: #1e1e2e;
            color: white;
            border: 1px solid #333;
            padding: 9px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
        button:hover, select:hover {
            background: #2a2a3e;
            border-color: #4a9eff;
        }

        #fs-btn {
            margin-left: auto;
        }

        /* ── EQ panel ──────────────────────────────────────────────────────── */
        .eq-panel {
            width: 100%;
            max-width: 1200px;
            background: #111120;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: center;
        }
        .eq-panel-heading {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 7px;
            color: #888;
        }
        .eq-panel-heading svg { color: #4a9eff; }
        .eq-panel-heading span {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }
        .eq-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }
        .eq-row label {
            font-size: 0.82rem;
            color: #ccc;
            white-space: nowrap;
            width: 105px;
        }
        input[type="range"] {
            flex: 1;
            accent-color: #4a9eff;
            cursor: pointer;
        }
        .eq-value {
            font-size: 0.78rem;
            color: #4a9eff;
            width: 48px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* ── Keyboard shortcut hint ────────────────────────────────────────── */
        .shortcuts {
            width: 100%;
            max-width: 1200px;
            font-size: 0.72rem;
            color: #444;
            text-align: center;
            line-height: 1.8;
        }
        .shortcuts kbd {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 1px 5px;
            font-family: monospace;
            font-size: 0.72rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div id="error-box"></div>

    <div class="video-container" id="video-container">
        <video id="main-player" controls autoplay playsinline></video>

        <div id="buffering-indicator">
            <div class="spinner-ring"></div>
        </div>

        <div id="skip-badge">
            <!-- icon injected by JS -->
            <span id="skip-badge-text">Skipping…</span>
        </div>
    </div>

    <div class="controls">
        <!-- Picture-in-Picture -->
        <button id="pip-btn" aria-label="Picture in Picture">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true">
                <path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 1.99 2 1.99h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16.01H3V4.98h18v14.03z"/>
            </svg>
            Picture-in-Picture
        </button>

        <select id="speed-select" title="Playback speed" aria-label="Playback speed">
            <option value="0.25">0.25×</option>
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1× Normal</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
            <option value="1.75">1.75×</option>
            <option value="2">2×</option>
        </select>

        <!-- Fullscreen -->
        <button id="fs-btn" title="Fullscreen (F)" aria-label="Toggle fullscreen">
            <svg id="fs-icon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true">
                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
            Fullscreen
        </button>
    </div>

    <div class="eq-panel">
        <div class="eq-panel-heading">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true">
                <path d="M10 20H8V4h2v16zm6 0h-2V4h2v16zm-3-8h-2v8h2v-8zm0-8h-2v4h2V4zM7 12H5V4h2v8zm0 8H5v-4h2v4zm12-8h-2v8h2v-8zm0-8h-2v4h2V4z"/>
            </svg>
            <span>Equalizer</span>
        </div>

        <div class="eq-row">
            <label for="eq-low">Bass (&lt;250 Hz)</label>
            <input type="range" id="eq-low" min="-15" max="15" step="1" value="4">
            <span class="eq-value" id="eq-low-label">4 dB</span>
        </div>

        <div class="eq-row">
            <label for="eq-high">Treble (&gt;4 kHz)</label>
            <input type="range" id="eq-high" min="-15" max="15" step="1" value="2">
            <span class="eq-value" id="eq-high-label">2 dB</span>
        </div>
    </div>

    <div class="shortcuts">
        <kbd>Space</kbd>/<kbd>K</kbd> Play/Pause &nbsp;·&nbsp;
        <kbd>←</kbd><kbd>→</kbd> ±10s &nbsp;·&nbsp;
        <kbd>↑</kbd><kbd>↓</kbd> Volume &nbsp;·&nbsp;
        <kbd>M</kbd> Mute &nbsp;·&nbsp;
        <kbd>F</kbd> Fullscreen
    </div>

    <script src="player.js"></script>

    <script>
        /* PiP */
        document.getElementById("pip-btn").addEventListener("click", async () => {
            const v = document.getElementById("main-player");
            try {
                document.pictureInPictureElement
                    ? await document.exitPictureInPicture()
                    : await v.requestPictureInPicture();
            } catch (err) {
                console.error("PiP failed:", err);
            }
        });

        /* Fullscreen — target the container, not the bare video */
        const fsBtn  = document.getElementById("fs-btn");
        const fsIcon = document.getElementById("fs-icon");

        const ICON_FS_ENTER = `<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>`;
        const ICON_FS_EXIT  = `<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>`;

        fsBtn.addEventListener("click", () => {
            const c = document.getElementById("video-container");
            try {
                document.fullscreenElement
                    ? document.exitFullscreen()
                    : (c.requestFullscreen?.() ?? document.getElementById("main-player").requestFullscreen?.());
            } catch (err) {
                console.warn("Fullscreen error:", err);
            }
        });

        document.addEventListener("fullscreenchange", () => {
            if (fsIcon) {
                fsIcon.innerHTML = document.fullscreenElement ? ICON_FS_EXIT : ICON_FS_ENTER;
            }
            const label = document.fullscreenElement ? "Exit Fullscreen" : "Fullscreen";
            // Update button text node (last child)
            const textNodes = [...fsBtn.childNodes].filter(n => n.nodeType === Node.TEXT_NODE);
            textNodes.forEach(n => n.textContent = " " + label);
        });
    </script>
</body>
</html>
