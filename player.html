<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebPlayer</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* Material 3 Dark Theme Colors */
        :root {
            --md-sys-color-background: #121212;
            --md-sys-color-surface: #1E1E1E;
            --md-sys-color-surface-container: #2A2A2A;
            --md-sys-color-primary: #A8C7FA; /* Material Blue Accent */
            --md-sys-color-on-primary: #062E6F;
            --md-sys-color-on-surface: #E3E3E3;
            --md-sys-color-on-surface-variant: #C4C7C5;
            --md-sys-color-error: #F2B8B5;
            --md-elevation-3: 0px 4px 8px 3px rgba(0,0,0,0.15), 0px 1px 3px rgba(0,0,0,0.3);
            --md-elevation-8: 0px 8px 10px 1px rgba(0,0,0,0.14), 0px 3px 14px 2px rgba(0,0,0,0.12), 0px 5px 5px -3px rgba(0,0,0,0.2);
        }

        body {
            background: var(--md-sys-color-background); 
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            color: var(--md-sys-color-on-surface); 
            font-family: 'Roboto', system-ui, sans-serif; 
            overflow: hidden;
        }

        /* ── Video container & Essentials ────────────────────────────────── */
        .video-container {
            position: relative; width: 100vw; height: 100vh; background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; touch-action: none;
        }
        video { width: 100%; height: 100%; object-fit: contain; outline: none; display: block; }
        .gesture-zone { position: absolute; inset: 0; z-index: 10; cursor: default; }

        /* ── Title bar ─────────────────────────────────────────────────────── */
        .title-bar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 30;
            padding: 20px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
            font-size: 1.1rem; font-weight: 500; opacity: 1;
            transition: opacity 0.3s ease; pointer-events: none;
        }
        .video-container.idle .title-bar { opacity: 0; }

        /* ── Buffering spinner (Material Circular Progress) ──────────────── */
        #buffering-indicator {
            position: absolute; inset: 0; display: flex; align-items: center;
            justify-content: center; pointer-events: none; opacity: 0;
            transition: opacity 0.2s ease; z-index: 15;
        }
        #buffering-indicator.is-buffering { opacity: 1; }
        .spinner-ring {
            width: 48px; height: 48px; border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--md-sys-color-primary); 
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Custom control bar ────────────────────────────────────────────── */
        .custom-controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
            padding: 40px 24px 16px; display: flex; flex-direction: column; gap: 12px;
            z-index: 30; opacity: 1; transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .video-container.idle .custom-controls { opacity: 0; pointer-events: none; }

        /* ── Progress bar (Material Slider) ────────────────────────────────── */
        .progress-wrapper {
            position: relative; width: 100%; height: 4px;
            background: rgba(255,255,255,0.2); border-radius: 2px;
            cursor: pointer; transition: height 0.2s; display: flex; align-items: center;
        }
        .progress-wrapper:hover { height: 6px; }
        .progress-buffered { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255,255,255,0.3); border-radius: 2px; width: 0%; pointer-events: none; }
        .progress-played   { position: absolute; left: 0; top: 0; bottom: 0; background: var(--md-sys-color-primary); border-radius: 2px; width: 0%; pointer-events: none; }
        .progress-thumb {
            position: absolute; left: 0%; width: 12px; height: 12px; background: var(--md-sys-color-primary);
            border-radius: 50%; transform: translateX(-50%) scale(0); opacity: 0;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s; pointer-events: none;
        }
        .progress-wrapper:hover .progress-thumb,
        .progress-wrapper.dragging .progress-thumb { opacity: 1; transform: translateX(-50%) scale(1.2); }

        /* ── Controls layout & Material Buttons ────────────────────────────── */
        .controls-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 16px; }
        .time-display { font-size: 0.85rem; font-variant-numeric: tabular-nums; color: var(--md-sys-color-on-surface-variant); margin-left: 8px;}

        button {
            background: transparent; border: none; color: var(--md-sys-color-on-surface); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; width: 40px; height: 40px;
            transition: background-color 0.2s ease;
        }
        button:hover { background-color: rgba(255,255,255,0.08); }
        .material-symbols-rounded { font-size: 28px; }

        /* ── Volume Slider ─────────────────────────────────────────────────── */
        .volume-container { display: flex; align-items: center; gap: 0; }
        .volume-slider {
            width: 0; opacity: 0; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            accent-color: var(--md-sys-color-primary); cursor: pointer; height: 4px;
        }
        .volume-container:hover .volume-slider { width: 80px; opacity: 1; margin-left: 8px; }
        @media (pointer: coarse) { .volume-slider { width: 80px !important; opacity: 1 !important; margin-left: 8px; } }

        /* ── Speed Pills (Material Chips) ──────────────────────────────────── */
        .speed-pills { display: flex; align-items: center; gap: 6px; }
        .speed-pill {
            font-size: 0.8rem; font-weight: 500; padding: 0 12px; height: 32px; border-radius: 16px; width: auto;
            background: rgba(255,255,255,0.08); color: var(--md-sys-color-on-surface-variant);
            transition: background 0.2s, color 0.2s; border: 1px solid rgba(255,255,255,0.1);
        }
        .speed-pill:hover { background: rgba(255,255,255,0.12); }
        .speed-pill.active { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border-color: transparent;}

        /* ── EQ Popover (Material Surface) ─────────────────────────────────── */
        .eq-popover {
            position: absolute; bottom: 90px; right: 24px;
            background: var(--md-sys-color-surface-container); 
            border-radius: 16px; padding: 24px; display: none; flex-direction: column; gap: 20px;
            z-index: 40; box-shadow: var(--md-elevation-8); width: 380px;
        }
        .eq-popover.active { display: flex; }
        .eq-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.1rem; font-weight: 500; color: var(--md-sys-color-on-surface);
        }
        .eq-close { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; }
        .eq-close:hover { opacity: 1; }
        
        /* Modifying Sliders for MD */
        .eq-band input[type="range"] { accent-color: var(--md-sys-color-primary); }
        .preamp-row input { accent-color: var(--md-sys-color-error); }
        .eq-sliders { display: flex; justify-content: space-around; height: 140px; align-items: flex-end; }
        .eq-band { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
        .eq-band input[type="range"] { writing-mode: vertical-lr; direction: rtl; width: 24px; height: 90px; cursor: pointer; margin: 0; }
        .eq-zero-mark { position: absolute; top: calc(50% - 10px); width: 16px; height: 2px; background: rgba(255,255,255,0.2); pointer-events: none; }
        .eq-band span { font-size: 0.7rem; color: var(--md-sys-color-on-surface-variant); font-weight: 500; }
        .preamp-row { display: flex; align-items: center; gap: 16px; font-size: 0.9rem; }

        /* ── Other Elements ────────────────────────────────────────────────── */
        .feedback-overlay {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            padding: 10px 24px; border-radius: 24px; font-size: 1rem; font-weight: 500;
            opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 20;
        }
        .badges-container { position: absolute; top: 24px; right: 24px; z-index: 20; }
        #skip-badge { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); padding: 8px 16px; border-radius: 16px; font-size: 0.85rem; font-weight: 500; display: none; opacity: 0; transform: translateY(-10px); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--md-elevation-3); }
        #skip-badge.showing { opacity: 1; transform: translateY(0); }

        /* ── Modals ────────────────────────────────────────────────────────── */
        #shortcuts-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(2px); }
        #shortcuts-modal.active { display: flex; }
        .shortcuts-box { background: var(--md-sys-color-surface-container); border-radius: 24px; padding: 32px; width: 400px; max-width: 90vw; box-shadow: var(--md-elevation-8); }
        .shortcuts-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.25rem; font-weight: 500; margin-bottom: 24px; color: var(--md-sys-color-on-surface); }
        .shortcuts-grid { display: grid; grid-template-columns: auto 1fr; gap: 12px 24px; align-items: center; }
        .shortcuts-grid kbd { background: rgba(255,255,255,0.1); border-radius: 6px; padding: 4px 10px; font-family: 'Roboto Mono', monospace; font-size: 0.85rem; color: var(--md-sys-color-on-surface); text-align: center; }
        .shortcuts-grid span { font-size: 0.95rem; color: var(--md-sys-color-on-surface-variant); }
        .shortcuts-hint { margin-top: 24px; font-size: 0.85rem; color: var(--md-sys-color-on-surface-variant); text-align: center; }
        
        #error-box { position: absolute; top: 24px; z-index: 100; display: none; flex-direction: column; align-items: center; gap: 16px; background: var(--md-sys-color-surface-container); color: var(--md-sys-color-error); padding: 20px 32px; border-radius: 16px; box-shadow: var(--md-elevation-8); }
        #error-retry { background: var(--md-sys-color-error); color: #390000; font-weight: 500; padding: 8px 24px; border-radius: 20px; width: auto; height: auto; }
    </style>
</head>
<body>

    <div id="error-box">
        <span id="error-msg"></span>
        <button id="error-retry">Retry</button>
    </div>

    <div class="video-container" id="video-container">
        <div class="title-bar" id="title-bar"></div>

        <video id="main-player" autoplay playsinline></video>
        <div class="gesture-zone" id="gesture-zone"></div>
        <div class="feedback-overlay" id="feedback-overlay"></div>

        <div id="buffering-indicator"><div class="spinner-ring"></div></div>

        <div class="badges-container">
            <div id="skip-badge">Skipping…</div>
        </div>

        <div class="custom-controls" id="custom-controls">
            <div class="progress-wrapper" id="progress-wrapper">
                <div class="progress-buffered" id="progress-buffered"></div>
                <div class="progress-played"   id="progress-played"></div>
                <div class="progress-thumb"    id="progress-thumb"></div>
            </div>

            <div class="controls-row">
                <div class="controls-left">
                    <button id="play-pause-btn" title="Play (k / space)">
                        <span class="material-symbols-rounded" id="play-icon">play_arrow</span>
                    </button>

                    <div class="volume-container">
                        <button id="mute-btn" title="Mute (m)">
                            <span class="material-symbols-rounded" id="mute-icon">volume_up</span>
                        </button>
                        <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
                    </div>

                    <div class="time-display">
                        <span id="time-current">0:00</span> / <span id="time-duration">0:00</span>
                    </div>
                </div>

                <div class="controls-right">
                    <select id="quality-select" style="display:none;"></select>

                    <div class="speed-pills" id="speed-pills">
                        <button class="speed-pill" data-speed="0.5">0.5×</button>
                        <button class="speed-pill active" data-speed="1">1×</button>
                        <button class="speed-pill" data-speed="1.5">1.5×</button>
                        <button class="speed-pill" data-speed="2">2×</button>
                    </div>

                    <button id="eq-toggle-btn" title="Equalizer">
                        <span class="material-symbols-rounded">tune</span>
                    </button>

                    <button id="shortcuts-btn" title="Keyboard shortcuts (?)">
                        <span class="material-symbols-rounded">keyboard</span>
                    </button>

                    <button id="pip-btn" title="Picture in picture">
                        <span class="material-symbols-rounded">picture_in_picture_alt</span>
                    </button>

                    <button id="fs-btn" title="Fullscreen (f)">
                        <span class="material-symbols-rounded" id="fs-icon">fullscreen</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="eq-popover" id="eq-popover">
            <div class="eq-header">
                <span>10-Band Equalizer</span>
                <span class="material-symbols-rounded eq-close" id="eq-close-btn">close</span>
            </div>
            <div class="preamp-row">
                <label>Preamp (<span id="preamp-label">1.0</span>×)</label>
                <input type="range" id="eq-preamp" min="0.1" max="3" step="0.1" value="1.0">
            </div>
            <div class="eq-sliders" id="eq-bands-container"></div>
        </div>
    </div>

    <div id="shortcuts-modal">
        <div class="shortcuts-box">
            <div class="shortcuts-header">
                <span>Keyboard Shortcuts</span>
                <span class="material-symbols-rounded eq-close" id="shortcuts-close" style="cursor:pointer">close</span>
            </div>
            <div class="shortcuts-grid">
                <kbd>Space</kbd> <span>Play / Pause</span>
                <kbd>← / →</kbd>     <span>Seek ±10s</span>
                <kbd>↑ / ↓</kbd>         <span>Volume ±5%</span>
                <kbd>M</kbd>         <span>Toggle mute</span>
                <kbd>F</kbd>         <span>Toggle fullscreen</span>
                <kbd>?</kbd>         <span>Show help</span>
            </div>
            <p class="shortcuts-hint">Double-tap left/right screen to seek ±10s on touch.</p>
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
