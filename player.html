<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebPlayer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a10; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh; color: white;
            font-family: system-ui, -apple-system, sans-serif; overflow: hidden;
        }

        #error-box {
            position: absolute; top: 20px; z-index: 100;
            display: none; background: rgba(92, 26, 26, 0.9);
            color: #ffaaaa; border: 1px solid #a33; border-radius: 8px;
            padding: 12px 20px; width: 90%; max-width: 600px; text-align: center; font-size: 0.9rem;
        }

        .video-container {
            position: relative; width: 100vw; height: 100vh; background: #000;
            display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none;
        }

        /* Video element - Removed native controls */
        video { width: 100%; height: 100%; object-fit: contain; outline: none; display: block; touch-action: none; }

        /* Gesture & Feedback Zone */
        .gesture-zone { position: absolute; inset: 0; z-index: 10; cursor: default; }
        
        .feedback-overlay {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 8px 16px;
            border-radius: 20px; font-size: 1rem; font-weight: bold; opacity: 0;
            pointer-events: none; transition: opacity 0.2s; z-index: 20;
        }

        /* Buffering Spinner */
        #buffering-indicator {
            position: absolute; inset: 0; display: flex; align-items: center;
            justify-content: center; pointer-events: none; opacity: 0; transition: opacity 0.2s ease; z-index: 15;
        }
        #buffering-indicator.is-buffering { opacity: 1; }
        .spinner-ring {
            width: 52px; height: 52px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #4a9eff; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Unified Control Bar */
        .custom-controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 40px 20px 15px; display: flex; flex-direction: column; gap: 10px;
            z-index: 30; opacity: 1; transition: opacity 0.3s ease;
        }
        .video-container.idle .custom-controls { opacity: 0; pointer-events: none; }

        /* Progress Bar */
        .progress-wrapper {
            position: relative; width: 100%; height: 6px; background: rgba(255,255,255,0.2);
            border-radius: 3px; cursor: pointer; transition: height 0.1s; display: flex; align-items: center;
        }
        .progress-wrapper:hover { height: 8px; }
        .progress-buffered { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255,255,255,0.4); border-radius: 3px; width: 0%; pointer-events: none; }
        .progress-played { position: absolute; left: 0; top: 0; bottom: 0; background: #4a9eff; border-radius: 3px; width: 0%; pointer-events: none; }
        .progress-thumb {
            position: absolute; left: 0%; width: 14px; height: 14px; background: #fff; border-radius: 50%;
            transform: translateX(-50%); opacity: 0; transition: opacity 0.1s; pointer-events: none; box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .progress-wrapper:hover .progress-thumb, .progress-wrapper.dragging .progress-thumb { opacity: 1; }

        /* Controls Layout */
        .controls-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 16px; }
        
        .time-display { font-size: 0.85rem; font-variant-numeric: tabular-nums; opacity: 0.9; }
        
        button {
            background: none; border: none; color: white; cursor: pointer; padding: 4px;
            display: flex; align-items: center; justify-content: center; opacity: 0.85; transition: opacity 0.2s, transform 0.1s;
        }
        button:hover { opacity: 1; transform: scale(1.1); }
        select { background: transparent; color: white; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; outline: none; }
        select option { background: #1a1a2e; color: white; }

        /* Volume Slider */
        .volume-container { display: flex; align-items: center; gap: 8px; }
        .volume-slider { width: 0px; opacity: 0; transition: width 0.2s, opacity 0.2s; accent-color: #4a9eff; cursor: pointer; }
        .volume-container:hover .volume-slider { width: 80px; opacity: 1; }

        /* EQ Popover Menu */
        .eq-popover {
            position: absolute; bottom: 80px; right: 20px; background: rgba(20,20,30,0.95);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 20px; display: none; flex-direction: column; gap: 16px; z-index: 40; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 320px;
        }
        .eq-popover.active { display: flex; }
        .eq-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; font-weight: bold; color: #ccc; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;}
        .eq-close { cursor: pointer; color: #fff; }
        
        .preamp-row { display: flex; align-items: center; gap: 12px; }
        .preamp-row label { font-size: 0.8rem; flex: 1; }
        .preamp-row input { flex: 2; accent-color: #ff4a4a; }
        
        .eq-sliders { display: flex; justify-content: space-between; height: 100px; padding-top: 10px; }
        .eq-band { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .eq-band input[type="range"] { -webkit-appearance: slider-vertical; appearance: slider-vertical; width: 6px; height: 70px; accent-color: #4a9eff; }
        .eq-band span { font-size: 0.6rem; color: #888; }

        /* Badges */
        .badges-container { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; pointer-events: none; z-index: 20;}
        #skip-badge { background: rgba(74, 158, 255, 0.9); color: white; padding: 6px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="error-box"></div>

    <div class="video-container" id="video-container">
        <video id="main-player" autoplay playsinline></video>
        <div class="gesture-zone" id="gesture-zone"></div>
        <div id="feedback-overlay" class="feedback-overlay"></div>
        
        <div id="buffering-indicator"><div class="spinner-ring"></div></div>
        
        <div class="badges-container">
            <div id="skip-badge">Skipping...</div>
        </div>

        <div class="custom-controls" id="custom-controls">
            <div class="progress-wrapper" id="progress-wrapper">
                <div class="progress-buffered" id="progress-buffered"></div>
                <div class="progress-played" id="progress-played"></div>
                <div class="progress-thumb" id="progress-thumb"></div>
            </div>

            <div class="controls-row">
                <div class="controls-left">
                    <button id="play-pause-btn" title="Play (k)">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path id="play-icon-path" d="M8 5.14v14l11-7-11-7z"/></svg>
                    </button>
                    
                    <div class="volume-container">
                        <button id="mute-btn" title="Mute (m)">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        </button>
                        <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
                    </div>

                    <div class="time-display">
                        <span id="time-current">0:00</span> / <span id="time-duration">0:00</span>
                    </div>
                </div>

                <div class="controls-right">
                    <select id="quality-select" style="display: none;"></select>
                    
                    <select id="speed-select" title="Speed">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>

                    <button id="eq-toggle-btn" title="Equalizer">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 20H8V4h2v16zm6 0h-2V4h2v16zm-3-8h-2v8h2v-8zm0-8h-2v4h2V4zM7 12H5V4h2v8zm0 8H5v-4h2v4zm12-8h-2v8h2v-8zm0-8h-2v4h2V4z"/></svg>
                    </button>

                    <button id="pip-btn" title="Picture in Picture">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 1.99 2 1.99h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16.01H3V4.98h18v14.03z"/></svg>
                    </button>

                    <button id="fs-btn" title="Fullscreen (f)">
                        <svg id="fs-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="eq-popover" id="eq-popover">
            <div class="eq-header">
                <span>10-Band Graphic Equalizer</span>
                <span class="eq-close" id="eq-close-btn">✕</span>
            </div>
            <div class="preamp-row">
                <label>Preamp (<span id="preamp-label">1.0</span>x)</label>
                <input type="range" id="eq-preamp" min="0.1" max="3" step="0.1" value="1.0">
            </div>
            <div class="eq-sliders" id="eq-bands-container"></div>
        </div>

    </div>

    <script src="player.js"></script>
</body>
</html>
