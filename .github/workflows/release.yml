name: Build and Publish Extension Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build browser folders
        run: node build.js

      - name: Resolve release version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF_NAME" ]; then
            TAG="$(node -p "require('./manifest.json').version")"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create Firefox .xpi
        run: |
          mkdir -p dist
          (cd build-firefox && zip -r "../dist/WebPlayer-${{ steps.version.outputs.version }}.xpi" .)

      - name: Create key file for Chrome .crx
        env:
          CHROME_EXTENSION_PRIVATE_KEY: ${{ secrets.CHROME_EXTENSION_PRIVATE_KEY }}
        run: |
          if [ -z "$CHROME_EXTENSION_PRIVATE_KEY" ]; then
            echo "Repository secret CHROME_EXTENSION_PRIVATE_KEY is not configured. Please add it in repository settings under Secrets and variables > Actions."
            exit 1
          fi
          printf '%s' "$CHROME_EXTENSION_PRIVATE_KEY" > key.pem
          chmod 600 key.pem

      - name: Create Chrome .crx
        run: |
          npx -y crx3@1.1.3 -p key.pem -o "dist/WebPlayer-${{ steps.version.outputs.version }}.crx" build-chrome

      - name: Cleanup signing key
        if: always()
        run: rm -f key.pem

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            dist/*.crx
            dist/*.xpi
